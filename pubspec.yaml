name: dashboard_fruit_hub
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  flutter_svg: ^2.2.3
  shared_preferences: ^2.5.4
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  firebase_auth: ^6.4.0
  dartz: ^0.10.1
  toastification: ^3.0.3
  cloud_firestore: ^6.3.0
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  modal_progress_hud_nsn: ^0.5.1
  image_picker: ^1.2.1
  supabase_flutter: ^2.12.0
  cached_network_image_ce: ^4.6.4
  equatable: ^2.0.8
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700


flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/styles/
  filename: app_images.dart
  field_prefix: null
  ignore_comments: true
  classname: AppImages

flutter_intl:
  enabled: true
  arb_dir: lib/core/l10n/arb
  output_dir: lib/core/l10n
  output_filename: app_localizations.dart
  class_name: AppLocalizations