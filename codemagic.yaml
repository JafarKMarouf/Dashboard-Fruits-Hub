workflows:
  android-release:
    name: Android Release
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'

    environment:
      groups:
        - app_env_vars
      flutter: stable

    scripts:
      # ── 1. Generate .env file ─────────────────────────────────────
      - name: Generate .env file
        script: |
          cat > "$CM_BUILD_DIR/.env" << 'EOF'
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          FCM_PROJECT_ID=$FCM_PROJECT_ID
          FCM_CLIENT_EMAIL=$FCM_CLIENT_EMAIL
          FCM_PRIVATE_KEY=$FCM_PRIVATE_KEY
          EOF

      # ── 2. Restore google-services.json ──────────────────────────
      - name: Restore google-services.json
        script: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode \
            > "$CM_BUILD_DIR/android/app/google-services.json"

      # ── 3. Bump version from git tag (v1.2.3 → 1.2.3+<build>) ────
      - name: Set version from tag
        script: |
          TAG="${CM_TAG:-}"
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            BUILD="$CM_BUILD_NUMBER"
            sed -i "s/^version:.*/version: $VERSION+$BUILD/" pubspec.yaml
            echo "Version set to $VERSION+$BUILD"
          else
            echo "Not a version tag — skipping version bump"
          fi

      # ── 4. Flutter setup ──────────────────────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ── 5. Generate l10n & assets ─────────────────────────────────
      - name: Generate localization & assets
        script: dart run build_runner build --delete-conflicting-outputs

      # ── 6. Analyze ────────────────────────────────────────────────
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos

      # ── 7. Build release APKs (split by ABI) ─────────────────────
      - name: Build APK (split-per-abi)
        script: |
            flutter build apk --release --split-per-abi
            flutter build appbundle --release
      
      # ── 8. Publish to GitHub Releases ────────────────────────────
      - name: Publish to GitHub Releases
        script: |
          TAG="${CM_TAG:-}"

          # Only proceed on version tags (v1.2.3)
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "⚠️  Not a version tag — skipping GitHub release"
            exit 0
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "🚀 Creating GitHub Release for $TAG..."

          # ── Create the release ────────────────────────────────────
          RELEASE_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GITHUB_OWNER/$GITHUB_REPO/releases" \
            -d "{
              \"tag_name\":         \"$TAG\",
              \"target_commitish\": \"main\",
              \"name\":             \"Release $TAG\",
              \"body\":             \"## 📦 Android Release $TAG\n\nBuild number: $CM_BUILD_NUMBER\n\n### Artifacts\n- APKs split by ABI (arm64-v8a, armeabi-v7a, x86_64)\n- Universal AAB for Play Store\",
              \"draft\":            false,
              \"prerelease\":       false
            }")

          # Extract upload URL (strip GitHub's URI template suffix)
          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'])" \
            | sed 's/{?name,label}//')

          if [[ -z "$UPLOAD_URL" ]]; then
            echo "❌ Failed to create release. Response:"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          echo "✅ Release created. Upload URL: $UPLOAD_URL"

          # ── Upload all APKs and AAB ───────────────────────────────
          find "$CM_BUILD_DIR/build" \( -name "*.apk" -o -name "*.aab" \) \
          | while read -r FILE; do
            FILENAME=$(basename "$FILE")
            echo "⬆️  Uploading $FILENAME..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              "$UPLOAD_URL?name=$FILENAME" \
              --data-binary @"$FILE")

            if [[ "$HTTP_STATUS" == "201" ]]; then
              echo "✅ Uploaded $FILENAME (HTTP $HTTP_STATUS)"
            else
              echo "❌ Failed to upload $FILENAME (HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

          echo "🎉 All artifacts published to GitHub Releases!"

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - $NOTIFY_EMAIL
        notify:
          success: true
          failure: true